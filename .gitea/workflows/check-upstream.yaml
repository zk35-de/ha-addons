name: Check Upstream ebusd Release

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for new upstream release
        env:
          GITEA_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail

          CURRENT=$(cat EBUSD_VERSION)
          LATEST_TAG=$(curl -sf https://api.github.com/repos/john30/ebusd/releases/latest \
            | jq -r .tag_name)
          LATEST="${LATEST_TAG#v}"   # strip leading v

          echo "Current: ${CURRENT}  Latest upstream: ${LATEST}"

          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "Already up to date."
            exit 0
          fi

          # Derive major.minor for john30 Docker tag (26.1.6 → v26.1)
          LATEST_MINOR="${LATEST%.*}"

          # Update tracked files
          echo "${LATEST}" > EBUSD_VERSION
          sed -i "s/^version: .*/version: \"${LATEST}\"/" \
            ebusd-heating/config.yaml ebusd-ventilation/config.yaml
          sed -i "s|FROM john30/ebusd:v[0-9.]*|FROM john30/ebusd:v${LATEST_MINOR}|g" \
            ebusd-heating/Dockerfile ebusd-ventilation/Dockerfile

          BRANCH="update/ebusd-${LATEST}"
          git config user.email "secra@zk35.de"
          git config user.name "Secra"
          git checkout -b "${BRANCH}"
          git add EBUSD_VERSION \
            ebusd-heating/config.yaml ebusd-ventilation/config.yaml \
            ebusd-heating/Dockerfile  ebusd-ventilation/Dockerfile
          git commit -m "chore: bump ebusd ${CURRENT} -> ${LATEST}"
          git push "https://secalpha:${GITEA_TOKEN}@git.zk35.de/secalpha/ha-addons.git" "${BRANCH}"

          curl -sf -X POST "https://git.zk35.de/api/v1/repos/secalpha/ha-addons/pulls" \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"title\": \"chore: bump ebusd ${CURRENT} -> ${LATEST}\",
              \"body\": \"Upstream john30/ebusd released **${LATEST}**.\n\nAuto-generated by check-upstream workflow. Review Dockerfile + config.yaml changes before merging – merge triggers automatic image build.\",
              \"head\": \"${BRANCH}\",
              \"base\": \"main\"
            }"

          echo "PR opened for ebusd ${LATEST}"
