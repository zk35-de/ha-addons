name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - "ebusd-heating/**"
      - "ebusd-ventilation/**"
      - "EBUSD_VERSION"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        addon: [ebusd-heating, ebusd-ventilation]
        arch:
          - ha: amd64
            base: ghcr.io/home-assistant/amd64-base-debian:trixie
            platform: linux/amd64
          - ha: aarch64
            base: ghcr.io/home-assistant/aarch64-base-debian:trixie
            platform: linux/arm64
          - ha: armv7
            base: ghcr.io/home-assistant/armv7-base-debian:trixie
            platform: linux/arm/v7
          - ha: armhf
            base: ghcr.io/home-assistant/armhf-base-debian:trixie
            platform: linux/arm/v6

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "ver=$(cat EBUSD_VERSION)" >> $GITHUB_OUTPUT

      - name: Derive john30 image tag (major.minor)
        id: ebusd_tag
        run: |
          VER=$(cat EBUSD_VERSION)
          echo "tag=v${VER%.*}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.addon }}
          platforms: ${{ matrix.arch.platform }}
          push: true
          build-args: |
            EBUSD_VERSION=${{ steps.ebusd_tag.outputs.tag }}
            BUILD_FROM=${{ matrix.arch.base }}
          tags: |
            ghcr.io/zk35-de/${{ matrix.addon }}-${{ matrix.arch.ha }}:${{ steps.ver.outputs.ver }}
            ghcr.io/zk35-de/${{ matrix.addon }}-${{ matrix.arch.ha }}:latest
