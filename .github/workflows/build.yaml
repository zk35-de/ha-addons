name: Build & Push

on:
  push:
    branches: [main]
    paths:
      - "ebusd-heating/**"
      - "ebusd-ventilation/**"
      - "EBUSD_VERSION"
      - ".github/workflows/build.yaml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        addon: [ebusd-heating, ebusd-ventilation]
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: ver
        run: echo "ver=$(cat EBUSD_VERSION)" >> $GITHUB_OUTPUT

      - name: Derive john30 image tag (major.minor)
        id: ebusd_tag
        run: |
          VER=$(cat EBUSD_VERSION)
          echo "tag=v${VER%.*}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.addon }}
          push: true
          build-args: EBUSD_VERSION=${{ steps.ebusd_tag.outputs.tag }}
          tags: |
            ghcr.io/zk35-de/${{ matrix.addon }}:${{ steps.ver.outputs.ver }}
            ghcr.io/zk35-de/${{ matrix.addon }}:latest
