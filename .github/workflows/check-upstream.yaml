name: Check Upstream ebusd Release

on:
  schedule:
    - cron: "0 6 * * 1"   # Mondays 06:00 UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Check for new upstream release and auto-update
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          CURRENT=$(cat EBUSD_VERSION)
          LATEST_TAG=$(curl -sf https://api.github.com/repos/john30/ebusd/releases/latest \
            | jq -r .tag_name)
          LATEST="${LATEST_TAG#v}"

          echo "Current: ${CURRENT}  Latest upstream: ${LATEST}"

          if [ "${CURRENT}" = "${LATEST}" ]; then
            echo "Already up to date – nothing to do."
            exit 0
          fi

          LATEST_MINOR="${LATEST%.*}"

          echo "${LATEST}" > EBUSD_VERSION
          sed -i "s/^version: .*/version: \"${LATEST}\"/" \
            ebusd-heating/config.yaml ebusd-ventilation/config.yaml
          sed -i "s|FROM docker.io/john30/ebusd:v[0-9.]*|FROM docker.io/john30/ebusd:v${LATEST_MINOR}|g" \
            ebusd-heating/Dockerfile ebusd-ventilation/Dockerfile

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add EBUSD_VERSION \
            ebusd-heating/config.yaml ebusd-ventilation/config.yaml \
            ebusd-heating/Dockerfile  ebusd-ventilation/Dockerfile
          git commit -m "chore: bump ebusd ${CURRENT} -> ${LATEST}"
          git push origin main

          echo "Pushed ebusd ${LATEST} – build pipeline triggered automatically."
