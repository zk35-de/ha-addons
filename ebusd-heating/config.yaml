name: eBUSd Heating
version: "26.1.6"
slug: ebusd_heating
description: >-
  ebusd for the eBUS heating bus. Connects Home Assistant to
  eBUS-enabled heating systems via USB or network adapter.
url: https://git.zk35.de/secalpha/ha-addons
arch:
  - amd64
  - aarch64
image: ghcr.io/zk35-de/ebusd-heating
init: false
startup: services
map:
  - addon_config:rw
services:
  - mqtt:want
uart: true
ports:
  8888/tcp: null
  8889/tcp: null
ports_description:
  8888/tcp: eBUSd TCP command port
  8889/tcp: eBUSd HTTP port (add --httpport=8889 to commandline_options to enable)
ingress: true
ingress_port: 7681
options:
  commandline_options:
    - "--mqttjson"
schema:
  device: "device(subsystem=tty)?"
  network_device: str?
  commandline_options:
    - str
